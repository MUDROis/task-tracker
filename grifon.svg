<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="62" fill="#1e293b"/>
  <g transform="translate(64,64) scale(0.9) translate(-64,-64)">
    <!-- body -->
    <ellipse cx="58" cy="82" rx="28" ry="20" fill="url(#g)"/>
    <!-- hind legs -->
    <rect x="38" y="94" width="8" height="18" rx="3" fill="#92400e"/>
    <rect x="66" y="94" width="8" height="18" rx="3" fill="#92400e"/>
    <ellipse cx="42" cy="113" rx="6" ry="3" fill="#78350f"/>
    <ellipse cx="70" cy="113" rx="6" ry="3" fill="#78350f"/>
    <!-- front legs -->
    <rect x="42" y="90" width="7" height="16" rx="3" fill="#a16207"/>
    <rect x="68" y="90" width="7" height="16" rx="3" fill="#a16207"/>
    <ellipse cx="45.5" cy="107" rx="5" ry="2.5" fill="#78350f"/>
    <ellipse cx="71.5" cy="107" rx="5" ry="2.5" fill="#78350f"/>
    <!-- tail -->
    <path d="M86 78 Q104 70 108 56 Q110 48 104 52 Q100 60 88 72" fill="url(#g)" stroke="#92400e" stroke-width="1"/>
    <circle cx="106" cy="50" r="5" fill="#fbbf24"/>
    <!-- neck -->
    <path d="M46 72 Q42 54 48 42 Q54 34 62 42 Q66 54 62 72" fill="url(#g)"/>
    <!-- eagle head -->
    <ellipse cx="52" cy="36" rx="14" ry="12" fill="#d97706"/>
    <!-- beak -->
    <path d="M38 34 L22 38 L38 40 Z" fill="#fbbf24" stroke="#92400e" stroke-width="1"/>
    <!-- eye -->
    <circle cx="46" cy="32" r="4" fill="white"/>
    <circle cx="47" cy="31.5" r="2.5" fill="#1e293b"/>
    <circle cx="48" cy="30.5" r="0.8" fill="white"/>
    <!-- ear/crest -->
    <path d="M54 26 L58 14 L62 26" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
    <path d="M48 28 L50 18 L54 26" fill="#fcd34d" stroke="#92400e" stroke-width="0.5"/>
    <!-- wings -->
    <path d="M60 60 Q76 44 96 28 Q92 40 88 48 Q96 34 104 24 Q98 44 88 56 Q78 66 64 72" fill="#f59e0b" stroke="#92400e" stroke-width="1" opacity="0.95"/>
    <path d="M66 58 Q80 46 92 34" fill="none" stroke="#b45309" stroke-width="0.8" opacity="0.6"/>
    <path d="M66 62 Q84 48 98 36" fill="none" stroke="#b45309" stroke-width="0.6" opacity="0.5"/>
    <path d="M64 66 Q86 52 100 40" fill="none" stroke="#92400e" stroke-width="0.5" opacity="0.4"/>
  </g>
